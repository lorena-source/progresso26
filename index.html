<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roadmap 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --blue:#1f7ae0;
  --petroleum:#001E27;
  --text:#1f2937;
  --muted:#64748b;
  --card:#ffffff;
  --line:#e5e7eb;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:transparent;
  font-family:'Poppins', sans-serif;
  color:var(--text);
  padding:8px;
}

.widget{
  width:100%;
  max-width:900px;
  margin:auto;
  background:var(--card);
  border-radius:18px;
  padding:20px 24px;
  border:1px solid #f1f5f9;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
}

.semester{
  display:grid;
  grid-template-columns:1fr 70px;
  gap:16px;
  align-items:center;
}

.title{
  font-size:18px;
  font-weight:700;
  margin-bottom:4px;
}

.h1Text{
  color:var(--blue);
}

.h2Text{
  color:var(--petroleum);
}

.period{
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
}

.progressTrack{
  width:100%;
  height:10px;
  background:#edf2f7;
  border-radius:999px;
  overflow:hidden;
}

.progressBar{
  height:100%;
  border-radius:999px;
  transition:width .8s ease;
}

.h1Bar{
  background:var(--blue);
}

.h2Bar{
  background:var(--petroleum);
}

.meta{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:11px;
  color:var(--muted);
}

.percent{
  font-size:24px;
  font-weight:700;
  text-align:right;
}

.divider{
  height:1px;
  background:var(--line);
  margin:14px 0;
}

@media(max-width:700px){

  .semester{
    grid-template-columns:1fr;
  }

  .percent{
    text-align:left;
  }

}

</style>
</head>

<body>

<div class="widget">

  <section class="semester">

    <div>

      <div class="title h1Text">H1 2026</div>

      <div class="period">
        01 Jan • 30 Jun
      </div>

      <div class="progressTrack">
        <div class="progressBar h1Bar" id="h1Bar"></div>
      </div>

      <div class="meta">
        <span id="h1Remaining"></span>
        <span id="h1Days"></span>
      </div>

    </div>

    <div class="percent h1Text" id="h1Percent"></div>

  </section>

  <div class="divider"></div>

  <section class="semester">

    <div>

      <div class="title h2Text">H2 2026</div>

      <div class="period">
        01 Jul • 31 Dez
      </div>

      <div class="progressTrack">
        <div class="progressBar h2Bar" id="h2Bar"></div>
      </div>

      <div class="meta">
        <span id="h2Remaining"></span>
        <span id="h2Days"></span>
      </div>

    </div>

    <div class="percent h2Text" id="h2Percent"></div>

  </section>

</div>

<script>

function startOfDay(date){
  return new Date(
    date.getFullYear(),
    date.getMonth(),
    date.getDate()
  );
}

function calculateProgress(startDate,endDate){

  const today = startOfDay(new Date());

  const start = startOfDay(startDate);

  const end = startOfDay(endDate);

  const msPerDay = 1000 * 60 * 60 * 24;

  const totalDays =
    Math.round((end - start) / msPerDay) + 1;

  let elapsedDays;

  if(today < start){

    elapsedDays = 0;

  }else if(today > end){

    elapsedDays = totalDays;

  }else{

    elapsedDays =
      Math.round((today - start) / msPerDay) + 1;

  }

  const remainingDays =
    Math.max(totalDays - elapsedDays,0);

  const percent =
    Math.round((elapsedDays / totalDays) * 100);

  return {

    totalDays,
    elapsedDays,
    remainingDays,
    percent

  };

}

function renderSemester(
  prefix,
  startDate,
  endDate
){

  const data =
    calculateProgress(
      startDate,
      endDate
    );

  document.getElementById(
    prefix + "Bar"
  ).style.width =
    data.percent + "%";

  document.getElementById(
    prefix + "Percent"
  ).textContent =
    data.percent + "%";

  document.getElementById(
    prefix + "Remaining"
  ).textContent =
    data.remainingDays +
    " dias restantes";

  document.getElementById(
    prefix + "Days"
  ).textContent =
    data.elapsedDays +
    " de " +
    data.totalDays +
    " dias";

}

renderSemester(
  "h1",
  new Date(2026,0,1),
  new Date(2026,5,30)
);

renderSemester(
  "h2",
  new Date(2026,6,1),
  new Date(2026,11,31)
);

</script>

</body>
</html>
